    <clipPath id="mi-a"><rect x="12" y="14" width="46" height="46" rx="14"/></clipPath>
    <mask id="mi-cut" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="#fff"/>
      <rect x="42" y="40" width="46" height="46" rx="14" fill="#000" clip-path="url(#mi-a)"/>
