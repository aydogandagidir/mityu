name: "Build and Test - DevTest"

on:
  workflow_dispatch:
    inputs:
      upload-artifacts:
        description: "Upload verified workflow artifacts"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Cross-platform development builds use the same immutable Action pins and
# secret scoping as production. They do not create GitHub releases.
jobs:
  build-devtest:
    name: Build ${{ matrix.platform-name }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            platform-name: macOS
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            platform-name: Windows
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: ubuntu-22.04
            platform-name: Linux (Ubuntu 22.04)
            target: x86_64-unknown-linux-gnu
            args: --bundles deb
          - platform: ubuntu-24.04
            platform-name: Linux (Ubuntu 24.04)
            target: x86_64-unknown-linux-gnu
            args: --bundles appimage,rpm
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: false
      asset-prefix: "mityu-devtest"
      upload-artifacts: ${{ inputs['upload-artifacts'] }}
