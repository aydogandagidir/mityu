name: "Release"

on:
  workflow_dispatch:

# Prevent duplicate releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an active release; later dispatches queue.

jobs:
  # STEP 0: Never create a tag/draft until the same commit passes CI.
  quality-gates:
    uses: ./.github/workflows/ci.yml

  # STEP 1: Create the Windows release draft after quality and secret gates.
  create-release:
    needs: quality-gates
    permissions:
      contents: write
    runs-on: ubuntu-latest
    environment: Production
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Fetch all tags
          persist-credentials: false

      - name: Validate release signing configuration
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SM_HOST: ${{ secrets.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          SM_CODE_SIGNING_CERT_SHA1_HASH: ${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
        run: |
          set -euo pipefail

          required=(
            TAURI_SIGNING_PRIVATE_KEY
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
            SM_HOST
            SM_API_KEY
            SM_CLIENT_CERT_PASSWORD
            SM_CODE_SIGNING_CERT_SHA1_HASH
            SM_CLIENT_CERT_FILE_B64
          )

          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "ERROR: Missing required production signing secrets:"
            printf '  - %s\n' "${missing[@]}"
            echo "Configure them before dispatching Release; no draft or tag was created."
            exit 1
          fi

          echo "Release signing configuration is present for updater and Windows signing."

      - name: Validate synchronized app version and check tag
        id: get-version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "ERROR: Production releases must be dispatched from main; got $GITHUB_REF."
            exit 1
          fi

          TAURI_VERSION=$(node -p "require('./frontend/src-tauri/tauri.conf.json').version")
          PACKAGE_VERSION=$(node -p "require('./frontend/package.json').version")
          CARGO_VERSION=$(awk -F'"' '/^version = "/ { print $2; exit }' frontend/src-tauri/Cargo.toml)
          LOCK_VERSION=$(awk '
            $0 == "name = \"mityu\"" { in_mityu = 1; next }
            in_mityu && /^version = "/ {
              gsub(/^version = "|"$/, "")
              print
              exit
            }
          ' Cargo.lock)

          echo "Tauri version:  $TAURI_VERSION"
          echo "Package version: $PACKAGE_VERSION"
          echo "Cargo version:   $CARGO_VERSION"
          echo "Lock version:    $LOCK_VERSION"

          if [[ -z "$TAURI_VERSION" || "$TAURI_VERSION" != "$PACKAGE_VERSION" || "$TAURI_VERSION" != "$CARGO_VERSION" || "$TAURI_VERSION" != "$LOCK_VERSION" ]]; then
            echo "ERROR: Application versions are not synchronized."
            echo "Update frontend/package.json, frontend/src-tauri/tauri.conf.json, frontend/src-tauri/Cargo.toml and the mityu entry in Cargo.lock together."
            exit 1
          fi

          if [[ ! "$TAURI_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "ERROR: Version must be strict SemVer X.Y.Z without prefixes or a fourth component."
            exit 1
          fi

          VERSION="$TAURI_VERSION"

          LATEST_TAG=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')
          LATEST_VERSION="${LATEST_TAG#v}"
          HIGHEST_VERSION=$(printf '%s\n%s\n' "$LATEST_VERSION" "$VERSION" | sort -V | tail -n 1)
          if [[ "$VERSION" == "$LATEST_VERSION" || "$HIGHEST_VERSION" != "$VERSION" ]]; then
            echo "ERROR: Candidate $VERSION must be greater than latest published version $LATEST_VERSION."
            exit 1
          fi

          EXISTING_RELEASE_IDS=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --jq ".[] | select(.tag_name == \"v${VERSION}\") | .id")
          if [[ -n "$EXISTING_RELEASE_IDS" ]]; then
            echo "ERROR: A GitHub release or draft already exists for v${VERSION}."
            echo "Review and explicitly clean up an unpublished failed draft before retrying."
            exit 1
          fi

          # Fetch all tags
          git fetch --tags

          if git tag -l "v${VERSION}" | grep -q .; then
            echo "ERROR: Tag v${VERSION} already exists."
            echo "Choose the next SemVer version and update every synchronized source before retrying."
            exit 1
          fi

          echo "Final version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `Mityu v${{ steps.get-version.outputs.version }}`,
              target_commitish: context.sha,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            })
            console.log(`Created draft release with ID: ${data.id}`)
            return data.id

  # STEP 2: v1.0.4 keeps the published v1.0.3 platform scope: Windows x64.
  # macOS stays excluded until its FFmpeg provenance, signing/notarization and
  # physical smoke-test gates are complete.
  build-windows:
    needs: create-release
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      platform: "windows-latest"
      target: "x86_64-pc-windows-msvc"
      ref: ${{ github.sha }}
      build-args: ""
      sign-binaries: true
      production-release: true
      asset-prefix: "mityu"
      upload-artifacts: false  # tauri-action uploads directly to release
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit

  # STEP 3: Show release summary
  release-summary:
    needs: [create-release, build-windows]
    runs-on: ubuntu-latest
    permissions:
      # Listing and downloading an unpublished draft's assets requires an
      # authenticated repository token, but no mutation permission.
      contents: read
    steps:
      - name: Checkout the exact release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install pinned Rust toolchain for updater verification
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0

      - name: Get release assets and latest.json
        id: release-info
        run: |
          set -euo pipefail

          VERSION="${{ needs.create-release.outputs.version }}"
          RELEASE_ID="${{ needs.create-release.outputs.release-id }}"

          ASSETS_JSON=$(gh api "repos/${{ github.repository }}/releases/${RELEASE_ID}/assets")
          ASSET_NAMES=$(jq -r '.[].name' <<< "$ASSETS_JSON")

          required_assets=(
            "Mityu_${VERSION}_x64-setup.exe"
            "Mityu_${VERSION}_x64-setup.exe.sig"
            "Mityu_${VERSION}_x64_en-US.msi"
            "Mityu_${VERSION}_x64_en-US.msi.sig"
            "latest.json"
          )

          missing=()
          for asset in "${required_assets[@]}"; do
            if ! grep -Fqx "$asset" <<< "$ASSET_NAMES"; then
              missing+=("$asset")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "ERROR: Draft release is missing required Windows artifacts:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "## Release Assets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List all release assets
          echo "### Files in Release" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          jq -r '.[] | "\(.name) (\(.size / 1048576 | floor)MB)"' <<< "$ASSETS_JSON" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Download and show latest.json
          echo "### latest.json content" >> $GITHUB_STEP_SUMMARY
          rm -f latest.json
          gh release download "v${VERSION}" --pattern "latest.json" --dir .
          gh release download "v${VERSION}" --pattern "Mityu_${VERSION}_x64-setup.exe" --dir .
          gh release download "v${VERSION}" --pattern "Mityu_${VERSION}_x64-setup.exe.sig" --dir .

          EXPECTED_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Mityu_${VERSION}_x64-setup.exe"
          jq -e --arg version "$VERSION" --arg url "$EXPECTED_URL" '
            .version == $version
            and ((.platforms["windows-x86_64"].signature // "") | length > 0)
            and (.platforms["windows-x86_64"].url == $url)
          ' latest.json > /dev/null

          MANIFEST_SIGNATURE=$(jq -r '.platforms["windows-x86_64"].signature' latest.json | tr -d '\r\n')
          ASSET_SIGNATURE=$(tr -d '\r\n' < "Mityu_${VERSION}_x64-setup.exe.sig")
          if [[ "$MANIFEST_SIGNATURE" != "$ASSET_SIGNATURE" ]]; then
            echo "ERROR: latest.json signature does not match the uploaded NSIS updater signature."
            exit 1
          fi

          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat latest.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Download links
          echo "### Download Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release page:** https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download all as ZIP:** https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.zip" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manual S3 upload:** Download latest.json from release and upload to \`s3://mityu-updates/latest.json\`" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify updater signature against the baked public key
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.create-release.outputs.version }}"

          # This step intentionally has no GitHub or signing secret. It verifies
          # the exact remotely downloaded artifact with the key baked into the
          # release commit, using Tauri's minisign-verify 0.2.5 algorithm.
          cargo run --locked --quiet -p updater-signature-verifier -- \
            "Mityu_${VERSION}_x64-setup.exe" \
            "Mityu_${VERSION}_x64-setup.exe.sig" \
            frontend/src-tauri/tauri.conf.json

      - name: Release Summary
        run: |
          echo "============================================"
          echo "=== Release Created Successfully ==="
          echo "============================================"
          echo "Version: v${{ needs.create-release.outputs.version }}"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"
          echo ""
          echo "Uploaded assets (via tauri-action):"
          echo "  - Windows: MSI + NSIS installers (SIGNED via signCommand) + .sig files"
          echo "  - Updater manifest: latest.json (auto-generated by tauri-action)"
          echo ""
          echo "Next steps:"
          echo "  1. Review the draft release"
          echo "  2. Edit release notes if needed"
          echo "  3. Publish the release when ready"
          echo "============================================"

          # Add to GitHub Step Summary
          echo "## Release Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.create-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** [View Release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Uploaded Assets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Assets |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Windows** | MSI installer (SIGNED), NSIS installer (SIGNED), .sig files |" >> $GITHUB_STEP_SUMMARY
          echo "| **Updater** | latest.json manifest (auto-generated by tauri-action) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. [Review the draft release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "2. Edit release notes if needed" >> $GITHUB_STEP_SUMMARY
          echo "3. Publish the release when ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  # A platform/signature/manifest failure may occur after tauri-action uploads
  # files to the new draft. Remove only this workflow's still-unpublished draft
  # and tag so invalid artifacts cannot be published accidentally.
  cleanup-failed-draft:
    needs: [create-release, build-windows, release-summary]
    if: ${{ always() && needs.create-release.result == 'success' && (needs.build-windows.result != 'success' || needs.release-summary.result != 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete failed unpublished draft and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          RELEASE_ID: ${{ needs.create-release.outputs.release-id }}
        run: |
          set -euo pipefail

          RELEASE_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")
          IS_DRAFT=$(jq -r '.draft' <<< "$RELEASE_JSON")
          TAG_NAME=$(jq -r '.tag_name' <<< "$RELEASE_JSON")
          if [[ "$IS_DRAFT" != "true" || "$TAG_NAME" != "v${VERSION}" ]]; then
            echo "ERROR: Refusing cleanup because release ${RELEASE_ID} is not the expected unpublished v${VERSION} draft."
            exit 1
          fi

          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"

          TAG_REFS=$(gh api "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/v${VERSION}" --jq '.[].ref')
          if grep -Fqx "refs/tags/v${VERSION}" <<< "$TAG_REFS"; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/v${VERSION}"
            echo "Removed failed draft v${VERSION} and its tag."
          else
            echo "Removed failed draft v${VERSION}; no tag had been created."
          fi
