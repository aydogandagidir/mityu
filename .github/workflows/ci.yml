name: ci
on:
  push: { branches: [ main, "feat/**", "fix/**" ] }
  pull_request: {}
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: lts/*, cache: pnpm, cache-dependency-path: frontend/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm tsc --noEmit
  server-isolation:
    # Enable once server/ exists (Phase 2). Fails the build if the cross-tenant test is missing.
    runs-on: ubuntu-latest
    if: ${{ hashFiles('server/**') != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: cross-tenant isolation test present & passing
        run: |
          test -n "$(find server -iname '*cross_tenant*')" || (echo "Missing mandatory cross-tenant isolation test" && exit 1)
          echo "Run the server test suite here (cargo test / pytest) including cross_tenant_isolation_test."
