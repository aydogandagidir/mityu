name: ci
on:
  workflow_call: {}
  push: { branches: [ main, "feat/**", "fix/**", "chore/**", "docs/**" ] }
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: "rustfmt, clippy" }
      - name: fmt
        run: cargo fmt --all --check
      - name: install native dependencies (Tauri/audio — mirrors build.yml's ubuntu list, unpinned)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libopenblas-dev libx11-dev libxtst-dev libxrandr-dev
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: ". -> target" }
      - name: build llama-helper sidecar (tauri-build fails without binaries/llama-helper-<target>)
        run: |
          cargo build -p llama-helper
          mkdir -p frontend/src-tauri/binaries
          cp target/debug/llama-helper "frontend/src-tauri/binaries/llama-helper-$(rustc -vV | grep 'host:' | awk '{print $2}')"
      - name: clippy
        # Warnings are advisory until the ~140-warning upstream baseline is burned
        # down (ADR-0017); deny-by-default correctness lints still fail the job.
        run: cargo clippy --all-targets
      - name: test
        run: cargo test --all
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        # Keep release CI on the exact frontend toolchain used by build.yml.
        with: { version: 10.33.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: 20.19.4, cache: pnpm, cache-dependency-path: frontend/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm tsc --noEmit
      - run: pnpm test
      - name: test privacy-minimised landing form
        run: npm --prefix ../landing test
  server-isolation:
    # Enable once server/ exists (Phase 2). Fails the build if the cross-tenant test is missing.
    # hashFiles() is steps-context only (evaluated on the runner): a job-level `if` using it
    # fails GitHub's workflow validation and kills the WHOLE file — guard the step instead.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: cross-tenant isolation test present & passing
        if: ${{ hashFiles('server/**') != '' }}
        run: |
          test -n "$(find server -iname '*cross_tenant*')" || (echo "Missing mandatory cross-tenant isolation test" && exit 1)
          echo "Run the server test suite here (cargo test / pytest) including cross_tenant_isolation_test."
