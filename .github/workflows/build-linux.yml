name: "Build and Test - Linux"

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type"
        required: true
        type: choice
        options:
          - debug
          - release
        default: release
      ubuntu-version:
        description: "Ubuntu version"
        required: true
        type: choice
        options:
          - ubuntu-22.04
          - ubuntu-24.04
        default: ubuntu-22.04
      bundle-type:
        description: "Bundle type"
        required: true
        type: choice
        options:
          - deb
          - appimage
          - rpm
          - all
        default: all
      upload-artifacts:
        description: "Upload verified workflow artifacts"
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build-args: ${{ steps.args.outputs.value }}
    steps:
      - id: args
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs['bundle-type'] }}" in
            deb) bundle_args="--bundles deb" ;;
            appimage) bundle_args="--bundles appimage" ;;
            rpm) bundle_args="--bundles rpm" ;;
            all) bundle_args="--bundles deb,appimage,rpm" ;;
            *) echo "Unsupported bundle type"; exit 1 ;;
          esac

          debug_arg=""
          if [[ "${{ inputs['build-type'] }}" == "debug" ]]; then
            debug_arg="--debug"
          fi
          echo "value=${debug_arg} ${bundle_args}" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: prepare
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ inputs['ubuntu-version'] }}
      target: "x86_64-unknown-linux-gnu"
      build-args: ${{ needs.prepare.outputs.build-args }}
      sign-binaries: false
      asset-prefix: "mityu"
      upload-artifacts: ${{ inputs['upload-artifacts'] }}
      is-debug-build: ${{ inputs['build-type'] == 'debug' }}
