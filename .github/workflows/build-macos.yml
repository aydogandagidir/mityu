name: "Build and Test - macOS"

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type"
        required: true
        type: choice
        options:
          - debug
          - release
        default: release
      upload-artifacts:
        description: "Upload verified workflow artifacts"
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# macOS remains a development-only target until its FFmpeg provenance,
# notarization and hardware-smoke gates pass. Reuse the pinned implementation.
jobs:
  build-macos:
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      platform: "macos-latest"
      target: "aarch64-apple-darwin"
      build-args: ${{ format('{0} --target aarch64-apple-darwin', inputs['build-type'] == 'debug' && '--debug' || '') }}
      sign-binaries: false
      asset-prefix: "mityu"
      upload-artifacts: ${{ inputs['upload-artifacts'] }}
      is-debug-build: ${{ inputs['build-type'] == 'debug' }}
