name: "Build and Test - Windows"

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type"
        required: true
        type: choice
        options:
          - debug
          - release
        default: release
      upload-artifacts:
        description: "Upload verified workflow artifacts"
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Keep the manual Windows path on the same pinned, secret-scoped implementation
# used by production releases. Do not duplicate signing logic in this wrapper.
jobs:
  build-windows:
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      platform: "windows-latest"
      target: "x86_64-pc-windows-msvc"
      build-args: ${{ inputs['build-type'] == 'debug' && '--debug' || '' }}
      sign-binaries: false
      asset-prefix: "mityu"
      upload-artifacts: ${{ inputs['upload-artifacts'] }}
      is-debug-build: ${{ inputs['build-type'] == 'debug' }}
